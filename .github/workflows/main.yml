name: Android CI — Build, Sign & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      sign_release:
        description: 'Sign the release APK with keystore secrets'
        required: false
        default: 'false'
        type: boolean

env:
  GRADLE_OPTS: "-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.name }}
      version_code: ${{ steps.version.outputs.code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create gradle/wrapper directory
        run: mkdir -p gradle/wrapper

      - name: Download gradle-wrapper.jar from correct source
        run: |
          echo "Downloading gradle-wrapper.jar..."
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/...
          echo "Download complete."
          ls -lh gradle/wrapper/gradle-wrapper.jar
          file gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep -o 'versionName\s*=\s*"[^"]*"' app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"' || echo "1.0")
          VERSION_CODE=$(grep -o 'versionCode\s*=\s*[0-9]*' app/build.gradle.kts | grep -o '[0-9]*' || echo "1")
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew test --no-daemon
        continue-on-error: true

      - name: Run Android Lint
        run: ./gradlew lintDebug --no-daemon
        continue-on-error: true

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-studio-mobile-debug-v${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: android-studio-mobile-release-unsigned-v${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

  sign:
    name: Sign Release APK
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.sign_release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create gradle/wrapper directory
        run: mkdir -p gradle/wrapper

      - name: Download gradle-wrapper.jar from correct source
        run: |
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://services.gradle.org/distributions/gradle-8.7-wrapper.jar

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Build Signed Release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: Verify APK signature
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK encontrado: $APK_PATH"
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools | sort -V | tail -1)/apksigner verify --verbose $APK_PATH || true

      - name: Upload Signed Release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-studio-mobile-release-signed-v${{ needs.build.outputs.version_name }}
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Android Studio Mobile ${{ needs.build.outputs.version_name }}"
          body: |
            ## Android Studio Mobile v${{ needs.build.outputs.version_name }}

            ### O que é
            IDE Android completa para uso mobile — edite, compile e instale APKs diretamente do seu dispositivo Android.

            ### Funcionalidades nesta versão
            - 📝 Editor Monaco com syntax highlighting Kotlin/Java/XML
            - 🔨 Build Gradle via Termux/JDK embutido
            - 🔑 Signed APK Wizard (geração de keystore + assinatura)
            - 👁️ Compose Preview estático offline
            - 🎨 Theme Editor com preview ao vivo
            - 📱 Device Simulator (17 perfis de dispositivos)
            - 🌲 Hierarchy Viewer para layouts XML
            - 🗄️ Database Inspector SQLite
            - 🔗 Module Graph visualizador
            - 🐛 Debug Variable Inspector
            - 🌿 Git integrado (commit, push, pull)
            - 📊 APK Analyzer
            - 🔄 Logcat em tempo real
            - 🔍 Busca em projeto
            - 🌐 LSP via kotlin-language-server (Termux)

            ### Instalação
            Faça o download do APK abaixo e instale no seu dispositivo Android (minSdk 26 / Android 8.0).
          files: app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        if: always() && env.KEYSTORE_BASE64 != ''
        run: rm -f release.keystore
